<text x="800" y="185" font-size="24" letter-spacing="5">FROM FOUNDATION TO DIRECTION</text>
<text x="220" y="610" font-size="23" letter-spacing="3">FOUNDATION</text>
<text x="220" y="650" font-size="19">learning to see</text>
<text x="500" y="550" font-size="23" letter-spacing="3">STUDY</text>
